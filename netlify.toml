[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' https://www.googletagmanager.com 'sha256-YqF4BNRPuZNe6lTvrlHU8oQd3r70Tvw/CyD2nf6sas8=' 'sha256-IBFLZyMNvjTVRTQOuRZp+4CnfnUMTUr2ir8h5bhiRiY=' 'sha256-hH1/CaBNI5ipilxCxUcEaRbULNigqCup2LqoDxW8BFY=' 'sha256-IpxLubtRJoPgPTgxtumf2NXIjhwuiEtU1pzmce+Q0Jo='; script-src-elem 'self' https://www.googletagmanager.com 'sha256-YqF4BNRPuZNe6lTvrlHU8oQd3r70Tvw/CyD2nf6sas8=' 'sha256-IBFLZyMNvjTVRTQOuRZp+4CnfnUMTUr2ir8h5bhiRiY=' 'sha256-hH1/CaBNI5ipilxCxUcEaRbULNigqCup2LqoDxW8BFY=' 'sha256-IpxLubtRJoPgPTgxtumf2NXIjhwuiEtU1pzmce+Q0Jo='; script-src-attr 'none'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.google-analytics.com https://*.googletagmanager.com https://*.g.doubleclick.net; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://*.google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com https://*.g.doubleclick.net; form-action 'self'; upgrade-insecure-requests"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
